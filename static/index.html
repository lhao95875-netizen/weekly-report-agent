<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>周报 Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--panel:rgba(26,26,26,.78);--panel2:rgba(40,40,40,.95);--text:#f6f1e9;--muted:#b3a58c;--line:rgba(245,158,11,.18);--shadow:0 20px 60px rgba(0,0,0,.45)}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:"IBM Plex Mono",monospace;color:var(--text);background:radial-gradient(circle at top left,rgba(239,68,68,.18),transparent 28%),radial-gradient(circle at 85% 20%,rgba(245,158,11,.16),transparent 30%),linear-gradient(135deg,#0a0a0a,#17130f 48%,#120d0b);padding:36px}.wrap{max-width:1180px;margin:0 auto;display:grid;gap:24px}.hero,.card{background:var(--panel);border:1px solid var(--line);box-shadow:var(--shadow);backdrop-filter:blur(14px);border-radius:24px}.hero{padding:28px;position:relative;overflow:hidden}.hero:after{content:"WEEKLY AGENT";position:absolute;right:22px;top:14px;color:rgba(245,158,11,.08);font-size:46px;letter-spacing:4px;font-weight:500}h1,h2{margin:0 0 14px;font-family:"ZCOOL XiaoWei",serif;font-weight:400;letter-spacing:1px}h1{font-size:44px}h2{font-size:28px}.sub{max-width:760px;color:var(--muted);line-height:1.8;font-size:14px}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:24px}.card{padding:22px}label{display:block;margin:14px 0 8px;color:#f8d9a0;font-size:13px}input,textarea,button{width:100%;border-radius:14px;border:1px solid rgba(245,158,11,.18);background:var(--panel2);color:var(--text);font:inherit}input,textarea{padding:14px 16px;outline:none}textarea{min-height:180px;resize:vertical;line-height:1.7}input:focus,textarea:focus{border-color:rgba(245,158,11,.55);box-shadow:0 0 0 4px rgba(245,158,11,.08)}button{margin-top:18px;padding:14px 18px;cursor:pointer;background:linear-gradient(90deg,#f59e0b,#ef4444);color:#1b1208;font-weight:700;transition:transform .18s ease,box-shadow .18s ease}button:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(239,68,68,.22)}.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}.output{min-height:220px;overflow:auto;display:grid;gap:14px;padding:18px;border-radius:18px;background:linear-gradient(180deg,rgba(245,158,11,.08),rgba(12,12,12,.86) 26%),rgba(12,12,12,.82);border:1px solid rgba(245,158,11,.24);color:#f3eadb;box-shadow:inset 0 1px 0 rgba(255,255,255,.04)}.output.empty,.output.loading,.output.error{display:flex;align-items:center;justify-content:center;text-align:center;font-size:15px}.output.loading{color:#ffd89b}.output.error{color:#ffb4b4;border-color:rgba(239,68,68,.35);background:linear-gradient(180deg,rgba(239,68,68,.12),rgba(12,12,12,.9))}.hint{font-size:12px;color:var(--muted);margin-top:8px}.pill{display:inline-block;border:1px solid rgba(245,158,11,.28);color:#ffd89b;padding:6px 10px;border-radius:999px;margin:0 8px 8px 0;font-size:12px}.result-hero{padding:16px 18px;border-radius:16px;background:linear-gradient(90deg,rgba(245,158,11,.18),rgba(239,68,68,.12));border:1px solid rgba(245,158,11,.2)}.result-kicker{font-size:11px;color:#f8d9a0;letter-spacing:1.4px;text-transform:uppercase;margin-bottom:8px}.result-title{font-family:"ZCOOL XiaoWei",serif;font-size:28px;line-height:1.35;margin:0}.result-meta{color:var(--muted);font-size:12px;margin-top:10px}.section-card{padding:14px 16px;border-radius:16px;background:rgba(255,255,255,.03);border:1px solid rgba(245,158,11,.14)}.section-title{margin:0 0 10px;color:#ffd89b;font-size:13px;letter-spacing:1px}.bullet-list{margin:0;padding-left:18px;line-height:1.85;color:#f8f0e1}.metric-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px}.metric-box{padding:14px;border-radius:14px;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.16);text-align:center}.metric-label{color:var(--muted);font-size:11px;margin-bottom:6px}.metric-value{font-size:24px;font-weight:700;color:#fff3da}.day-stack{display:grid;gap:12px}.day-card{padding:14px 16px;border-radius:14px;background:rgba(255,255,255,.025);border-left:4px solid rgba(245,158,11,.55);border-top:1px solid rgba(245,158,11,.12);border-right:1px solid rgba(245,158,11,.08);border-bottom:1px solid rgba(245,158,11,.08)}.day-date{font-family:"ZCOOL XiaoWei",serif;font-size:22px;margin-bottom:8px;color:#fff0d0}.day-summary{color:#f7e7c4;margin-bottom:10px;line-height:1.75}.report-text{white-space:pre-wrap;line-height:1.95;font-size:15px;color:#fff2dc}@media (max-width:920px){.grid,.two-col{grid-template-columns:1fr}body{padding:18px}h1{font-size:34px}}
</style>
</head>
<body>
<div class="wrap">
<section class="hero"><div class="pill">日报录入</div><div class="pill">结构化提取</div><div class="pill">周报总结</div><h1>周报 Agent</h1><div class="sub">每天把工作内容告诉它，它帮你沉淀成结构化日报；一周结束后，再自动汇总成中文周报。</div></section>
<section class="grid">
<div class="card"><h2>1. 新增日报</h2><label for="logDate">日期</label><input id="logDate" type="date" /><label for="logContent">今天做了什么</label><textarea id="logContent" placeholder="例如：&#10;- 完成登录接口联调&#10;- 修复支付页按钮状态异常&#10;- 和产品确认下周需求排期"></textarea><button id="saveLog">保存日报</button><div class="hint">支持自然语言输入，后端会自动转成结构化日报。</div></div>
<div class="card"><h2>2. 查看某天日报</h2><label for="queryDate">日期</label><input id="queryDate" type="date" /><button id="fetchLog">查看日报</button><div id="logResult" class="output empty">这里会显示更醒目的日报结果卡片。</div></div>
<div class="card"><h2>3. 查看周数据</h2><div class="two-col"><div><label for="weekStart">开始日期</label><input id="weekStart" type="date" /></div><div><label for="weekEnd">结束日期</label><input id="weekEnd" type="date" /></div></div><button id="fetchWeekly">查看周数据</button><div id="weeklyResult" class="output empty">这里会显示按天拆分的周数据面板。</div></div>
<div class="card"><h2>4. 生成周报</h2><div class="two-col"><div><label for="reportStart">开始日期</label><input id="reportStart" type="date" /></div><div><label for="reportEnd">结束日期</label><input id="reportEnd" type="date" /></div></div><button id="generateReport">生成周报</button><div id="reportResult" class="output empty">这里会显示最终周报正文。</div></div>
</section></div>
<script>
const today=new Date().toISOString().slice(0,10);['logDate','queryDate','weekStart','weekEnd','reportStart','reportEnd'].forEach(id=>document.getElementById(id).value=today);const esc=(v='')=>v.replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;');const setState=(el,state,text)=>{el.className=`output ${state}`;el.innerHTML=esc(text)};const list=items=>!items||!items.length?'<div class="hint">暂无内容</div>':`<ul class="bullet-list">${items.map(i=>`<li>${esc(i)}</li>`).join('')}</ul>`;function renderLog(log){const s=log.structured||{},tasks=(s.tasks||[]).map(i=>i.title||'');return `<div class="result-hero"><div class="result-kicker">daily log</div><div class="result-title">${esc(s.summary||'已保存日报')}</div><div class="result-meta">日期：${esc(log.date||'')} · 创建时间：${esc(log.created_at||'')}</div></div><div class="section-card"><div class="section-title">原始日报</div><div class="report-text">${esc(log.content||'')}</div></div><div class="section-card"><div class="section-title">完成事项</div>${list(tasks)}</div><div class="section-card"><div class="section-title">风险与阻塞</div>${list(s.blockers||[])}</div><div class="section-card"><div class="section-title">后续计划</div>${list(s.plans||[])}</div>`}function renderDailyQuery(data){if(!data.logs||!data.logs.length)return '<div class="result-hero"><div class="result-title">这一天还没有日报</div><div class="result-meta">可以先去左侧新增一条。</div></div>';return data.logs.map(renderLog).join('')}function renderWeekly(data){const days=(data.logs||[]).map(log=>`<div class="day-card"><div class="day-date">${esc(log.date)}</div><div class="day-summary">${esc((log.structured&&log.structured.summary)||log.content||'')}</div>${list(((log.structured&&log.structured.tasks)||[]).map(i=>i.title||''))}</div>`).join('');return `<div class="result-hero"><div class="result-kicker">weekly view</div><div class="result-title">${esc(data.start)} → ${esc(data.end)}</div><div class="result-meta">本周共收集 ${esc(String(data.count||0))} 条日报</div></div><div class="metric-row"><div class="metric-box"><div class="metric-label">日报数</div><div class="metric-value">${esc(String(data.count||0))}</div></div><div class="metric-box"><div class="metric-label">开始</div><div class="metric-value" style="font-size:16px">${esc(data.start||'')}</div></div><div class="metric-box"><div class="metric-label">结束</div><div class="metric-value" style="font-size:16px">${esc(data.end||'')}</div></div></div><div class="section-card"><div class="section-title">按天查看</div><div class="day-stack">${days||'<div class="hint">这一周还没有数据</div>'}</div></div>`}function renderReport(data){return `<div class="result-hero"><div class="result-kicker">weekly report</div><div class="result-title">周报已生成</div><div class="result-meta">统计区间：${esc(data.start||'')} 到 ${esc(data.end||'')} · 共 ${esc(String(data.count||0))} 条日报</div></div><div class="section-card"><div class="section-title">周报正文</div><div class="report-text">${esc(data.report||'')}</div></div>`}async function request(url,opt={}){const res=await fetch(url,{headers:{'Content-Type':'application/json'},...opt}),data=await res.json();if(!res.ok)throw new Error(data.detail||'请求失败');return data}document.getElementById('saveLog').addEventListener('click',async()=>{const date=document.getElementById('logDate').value,content=document.getElementById('logContent').value.trim(),result=document.getElementById('logResult');if(!content)return setState(result,'error','请先输入日报内容。');setState(result,'loading','正在保存日报...');try{const data=await request('/logs',{method:'POST',body:JSON.stringify({date,content})});result.className='output';result.innerHTML=renderLog(data.log)}catch(e){setState(result,'error',e.message)}});document.getElementById('fetchLog').addEventListener('click',async()=>{const date=document.getElementById('queryDate').value,result=document.getElementById('logResult');setState(result,'loading','正在读取日报...');try{const data=await request(`/logs?date=${date}`);result.className='output';result.innerHTML=renderDailyQuery(data)}catch(e){setState(result,'error',e.message)}});document.getElementById('fetchWeekly').addEventListener('click',async()=>{const start=document.getElementById('weekStart').value,end=document.getElementById('weekEnd').value,result=document.getElementById('weeklyResult');setState(result,'loading','正在聚合周数据...');try{const data=await request(`/weekly?start=${start}&end=${end}`);result.className='output';result.innerHTML=renderWeekly(data)}catch(e){setState(result,'error',e.message)}});document.getElementById('generateReport').addEventListener('click',async()=>{const start=document.getElementById('reportStart').value,end=document.getElementById('reportEnd').value,result=document.getElementById('reportResult');setState(result,'loading','正在生成周报...');try{const data=await request('/weekly-report',{method:'POST',body:JSON.stringify({start,end})});result.className='output';result.innerHTML=renderReport(data)}catch(e){setState(result,'error',e.message)}});
</script>
</body>
</html>
